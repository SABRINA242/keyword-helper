<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대본 나누기 (OpenAI 직접 호출)</title>
  <style>
    :root{
      --bg:#0b0f14; --panel:#121824; --panel2:#0f1520;
      --text:#e6edf3; --muted:#9aa4b2; --border:#263244;
      --accent:#7aa2f7; --bad:#ff6b6b; --good:#2ecc71;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "맑은 고딕";
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:var(--sans); background:var(--bg); color:var(--text); font-size:16px}
    .wrap{max-width:1100px; margin:0 auto; padding:20px}
    .top{display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap}
    h1{margin:0; font-size:20px; letter-spacing:-0.2px}
    .hint{color:var(--muted); font-size:12px}
    .grid{display:flex; flex-direction:column; gap:14px; margin-top:14px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--border); border-radius:12px; padding:14px}
    label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px}
    textarea{width:100%; min-height:420px; resize:vertical; border-radius:10px; padding:12px; border:1px solid var(--border); background:#0a101a; color:var(--text); font-family:var(--sans); line-height:1.6; font-size:16px}
    input{border-radius:10px; padding:8px 10px; border:1px solid var(--border); background:#0a101a; color:var(--text)}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .row > *{flex:0 0 auto}
    button{border:1px solid var(--border); background:rgba(122,162,247,0.12); color:var(--text); padding:9px 14px; border-radius:10px; cursor:pointer}
    button:hover{border-color:rgba(122,162,247,0.65)}
    button:disabled{opacity:0.5; cursor:not-allowed}
    .status{font-size:12px; color:var(--muted)}
    .ok{color:var(--good)}
    .bad{color:var(--bad)}
    .out{font-family:var(--mono); font-size:14px; white-space:pre-wrap; word-break:break-word}
    details{border:1px solid var(--border); border-radius:10px; background:#0a101a; padding:10px 12px; margin-top:10px}
    summary{cursor:pointer; color:var(--text)}
    .pill{display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--border); color:var(--muted); margin-left:6px}
    .scene{padding:10px 12px; border:1px dashed rgba(38,50,68,0.9); border-radius:10px; margin-top:8px; background:rgba(255,255,255,0.02)}
    .sceneHead{display:flex; gap:10px; align-items:center; flex-wrap:wrap; color:var(--muted); font-size:11px; margin-bottom:6px}
    .copy{margin-left:auto; font-size:11px; padding:5px 9px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>대본 나누기 (장소/시간 섹션 → 130자 씬)</h1>
        <div class="hint">원문 글자를 한 글자도 버리지 않고, 인덱스로 잘라서 섹션 안을 130자 씬으로 쪼갭니다.</div>
      </div>
      <div class="row" style="margin-left:auto">
        <div>
          <label>OpenAI API Key</label>
          <div class="row">
            <input id="apiKey" type="password" placeholder="sk-..." style="width:210px" />
            <button id="saveKeyBtn" style="padding:6px 10px; font-size:11px;">키 저장</button>
          </div>
        </div>
        <div>
          <label>모델</label>
          <input id="model" type="text" placeholder="gpt-4o-mini" style="width:140px" />
        </div>
        <div>
          <label>씬 글자수</label>
          <input id="sceneLen" type="number" value="130" min="1" style="width:80px" />
        </div>
      </div>
    </div>
 
    <div class="grid">
      <div class="card">
        <label>대본 입력</label>
        <textarea id="input" placeholder="여기에 대본을 붙여넣기"></textarea>
        <div class="row" style="margin-top:10px">
          <div class="status" id="status">대기 중</div>
          <button id="runBtn" style="margin-left:auto;">분석</button>
        </div>
      </div>
      <div class="card">
        <label>출력</label>
        <textarea id="output" class="out" readonly>아직 결과 없음</textarea>
        <div class="row" style="margin-top:10px">
          <button id="downloadTxtBtn">TXT 내보내기</button>
        </div>
      </div>
    </div>
  </div>
 
  <script>
    const qs = (id) => document.getElementById(id);
    let lastResult = null;
 
    function setStatus(text, cls){
      const el = qs("status");
      el.textContent = text;
      el.className = "status " + (cls || "");
    }
 
    function escapeHtml(s){
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
 
    function extractJson(text){
      let s = text.trim();
      if(s.startsWith("```")){
        s = s.replace(/^```[a-zA-Z]*\s*/, "");
        s = s.replace(/\s*```$/, "");
        s = s.trim();
      }
      return JSON.parse(s);
    }
 
    function normalizeRanges(ranges, textLen){
      if(!ranges || !ranges.length){
        return [{start:0,end:textLen,place:"",time:""}];
      }
      ranges = ranges.map(r => ({
        start: Math.max(0, Math.min(textLen, Number(r.start))),
        end: Math.max(0, Math.min(textLen, Number(r.end))),
        place: (r.place || "") + "",
        time: (r.time || "") + ""
      }));
      ranges.sort((a,b) => a.start === b.start ? a.end - b.end : a.start - b.start);
 
      const out = [];
      let prevEnd = 0;
      for(const r of ranges){
        let s = r.start;
        let e = r.end;
        if(e < s){ const tmp = s; s = e; e = tmp; }
        if(s > prevEnd){
          out.push({start:prevEnd,end:s,place:"",time:""});
        }
        if(s < prevEnd) s = prevEnd;
        if(e > s){
          out.push({start:s,end:e,place:r.place,time:r.time});
          prevEnd = e;
        }
      }
      if(prevEnd < textLen){
        out.push({start:prevEnd,end:textLen,place:"",time:""});
      }
      const merged = [];
      for(const r of out){
        const last = merged[merged.length-1];
        if(last && last.end === r.start && last.place === r.place && last.time === r.time){
          last.end = r.end;
        }else{
          merged.push(r);
        }
      }
      return merged;
    }
 
    function smartSceneRanges(text, start, end, targetLen){
      if(targetLen <= 0) throw new Error("scene size must be > 0");
      const minLen = Math.max(1, targetLen - 20);
      const quoteEnd = ["\"", "'"];
      const sentenceEnd = ["."];
      const res = [];
      let cur = start;
      while(cur < end){
        let lastBoundary = -1;
        let i = cur + 1;
        for(; i <= end; i++){
          const ch = text[i-1];
          const isBoundary = (sentenceEnd.indexOf(ch) !== -1) || (quoteEnd.indexOf(ch) !== -1);
          if(isBoundary){
            lastBoundary = i;
          }
          const len = i - cur;
          if(len >= minLen && lastBoundary !== -1 && len >= targetLen){
            res.push({start:cur,end:lastBoundary});
            cur = lastBoundary;
            break;
          }
        }
        if(cur >= end){
          break;
        }
        if(i > end){
          if(lastBoundary !== -1 && lastBoundary > cur){
            res.push({start:cur,end:lastBoundary});
            cur = lastBoundary;
          }else{
            res.push({start:cur,end:end});
            break;
          }
        }
      }
      return res;
    }
 
    function mergeSceneRanges(ranges, text, targetLen){
      if(!ranges.length) return ranges;
      const minKeep = Math.max(30, Math.floor(targetLen * 0.4));
      const merged = [];
      for(let i=0;i<ranges.length;i++){
        const r = ranges[i];
        const len = r.end - r.start;
        const chunk = text.slice(r.start, r.end);
        const trimmedLen = chunk.trim().length;
        if(!merged.length){
          merged.push(r);
          continue;
        }
        if(len < minKeep || trimmedLen < 10){
          const last = merged[merged.length-1];
          last.end = r.end;
        }else{
          merged.push(r);
        }
      }
      return merged;
    }

    function inferPlaceFromSegment(text, start, end){
      const seg = text.slice(start, end);
      const re = /([가-힣0-9A-Za-z ]{1,15}?)(마루|마당|앞마당|부엌|사랑채|기슭|개울가|골목|거리|시장|학교|교실|옥상|계단|복도|병원|공원|카페|식당|주방|사무실|회의실|공장|창고|운동장|강가|해변|바닷가|산길|들판|논두렁|밭두렁)(에서|에|으로|로)/g;
      let m;
      let last = null;
      while((m = re.exec(seg)) !== null){
        const name = (m[1] + m[2]).trim();
        if(name){
          last = name;
        }
      }
      return last || "";
    }

    function refinePlaces(text, sections){
      if(!Array.isArray(sections)) return;
      sections.forEach(sec => {
        const inferred = inferPlaceFromSegment(text, sec.start, sec.end);
        if(inferred){
          sec.place = inferred;
        }
      });
    }
 
    function fixNameSplits(sections){
      if(!Array.isArray(sections)) return;
      let prev = null;
      for(let si=0;si<sections.length;si++){
        const sec = sections[si];
        if(!Array.isArray(sec.scenes)) continue;
        for(let ci=0;ci<sec.scenes.length;ci++){
          const sc = sec.scenes[ci];
          if(prev){
            const a = prev.text || "";
            const b = sc.text || "";
            if(a && b){
              const lastChar = a[a.length-1];
              const firstChar = b[0];
              if(/[가-힣]/.test(lastChar) && firstChar === "씨"){
                prev.text = a.slice(0, -1);
                sc.text = lastChar + b;
              }
            }
          }
          prev = sc;
        }
      }
    }

    function refineScenes(text, sections){
      if(!Array.isArray(sections)) return;
      const contStarts = ["이었", "였", "였다", "였죠", "이었죠"];
      sections.forEach(sec => {
        if(!Array.isArray(sec.scenes)) return;
        const scenes = sec.scenes;
        const place = (sec.place || "").trim();

        // 1) 앞 씬이 끝나고 바로 "이었죠"류로 시작하면 뒤 씬을 앞 씬에 붙인다.
        for(let i=1;i<scenes.length;){
          const prev = scenes[i-1];
          const cur = scenes[i];
          let head = text.slice(cur.start, cur.start + 3);
          head = head.replace(/^\s+/, "");
          let merge = false;
          for(let k=0;k<contStarts.length;k++){
            const p = contStarts[k];
            if(head.startsWith(p)){
              merge = true;
              break;
            }
          }
          if(merge){
            prev.end = cur.end;
            prev.text += cur.text;
            scenes.splice(i,1);
            continue;
          }
          i++;
        }

        // 2) 현재 섹션 장소로 "로 내려왔습니다." 같은 이동 문장이 있으면
        //    그 문장을 다음 씬으로 넘겨서, 이동 이후 분위기/풍경과 같은 씬에 묶는다.
        if(place){
          const movePattern = place + "로 내려왔습니다.";
          for(let i=0;i<scenes.length-1;i++){
            const sc = scenes[i];
            const next = scenes[i+1];
            const segText = text.slice(sc.start, sc.end);
            const rel = segText.indexOf(movePattern);
            if(rel === -1) continue;

            let splitIdx = sc.start + rel;
            let j = splitIdx;
            while(j > sc.start){
              const ch = text[j-1];
              if(ch === "." || ch === "!" || ch === "?" || ch === "…" || ch === "\n"){
                break;
              }
              j--;
            }
            let splitStart = j;
            while(splitStart < sc.end && /\s/.test(text[splitStart])){
              splitStart++;
            }
            if(splitStart <= sc.start || splitStart >= sc.end) continue;

            const oldNextEnd = next.end;
            sc.end = splitStart;
            next.start = splitStart;
            sc.text = text.slice(sc.start, sc.end);
            next.text = text.slice(next.start, oldNextEnd);
          }
        }

        scenes.forEach((sc, idx) => {
          sc.index = idx + 1;
        });
        sec.scene_count = scenes.length;
      });
    }
 
    function buildOutput(text, ranges, sceneLen){
      const normalized = normalizeRanges(ranges, text.length);
      const base = sceneLen > 0 ? sceneLen : 130;

      // 1) 전체 대본 기준으로 전역 씬을 먼저 만든다.
      let globalRanges = smartSceneRanges(text, 0, text.length, base);
      globalRanges = mergeSceneRanges(globalRanges, text, base);

      const globalScenes = globalRanges.map((sr, i) => ({
        index: i+1,
        start: sr.start,
        end: sr.end,
        text: text.slice(sr.start, sr.end)
      }));

      // 2) GPT가 준 섹션 범위를 기준으로, 전역 씬을 섹션에 할당한다.
      const sections = normalized.map((r, idx) => ({
        index: idx+1,
        place: r.place,
        time: r.time,
        start: r.start,
        end: r.end,
        scene_len: base,
        scene_count: 0,
        scenes: []
      }));

      let si = 0;
      for(const sc of globalScenes){
        // 현재 씬이 속할 섹션 인덱스 찾기
        while(si < sections.length-1 && sc.start >= sections[si].end){
          si++;
        }
        let chosen = si;
        if(si < sections.length-1 && sc.end > sections[si].end){
          const leftOverlap = Math.max(0, sections[si].end - sc.start);
          const rightOverlap = Math.max(0, sc.end - sections[si+1].start);
          if(rightOverlap > leftOverlap){
            chosen = si + 1;
          }
        }
        sections[chosen].scenes.push(sc);
      }

      // 3) 빈 섹션 제거 및 start/end 재조정
      const filtered = [];
      sections.forEach(sec => {
        if(sec.scenes.length){
          sec.start = sec.scenes[0].start;
          sec.end = sec.scenes[sec.scenes.length-1].end;
          sec.scene_count = sec.scenes.length;
          filtered.push(sec);
        }
      });

      // 4) 인덱스 재부여
      filtered.forEach((sec, si2) => {
        sec.index = si2 + 1;
        sec.scenes.forEach((sc, ci) => {
          sc.index = ci + 1;
        });
      });

      // 5) 장소/씬 후처리
      refinePlaces(text, filtered);
      refineScenes(text, filtered);
      fixNameSplits(filtered);

      return {
        scene_len: base,
        section_count: filtered.length,
        text_len: text.length,
        sections: filtered
      };
    }
 
    function reconstruct(obj){
      const parts = [];
      for(const sec of obj.sections || []){
        for(const sc of sec.scenes || []){
          parts.push(sc.text || "");
        }
      }
      return parts.join("");
    }
 
    function buildTxtExport(obj, originalText){
      const lines = [];
      let globalIndex = 1;
      const text = originalText;
      for(const sec of obj.sections || []){
        for(const sc of sec.scenes || []){
          const s = sc.start;
          const e = sc.end;
          const full = text.slice(s, e);
          let head = text.slice(s, Math.min(e, s + 20));
          head = head.replace(/\s+/g, " ").trim();
          lines.push(globalIndex + " | " + head);
          lines.push(full.trimEnd());
          lines.push("");
          globalIndex++;
        }
      }
      return lines.join("\n");
    }

    function downloadTextFile(name, content){
      const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function renderResult(obj){
      const el = qs("output");
      const ok = obj.verify && obj.verify.ok;
      const lines = [];
      lines.push("섹션 " + obj.section_count + "개 / 씬 길이 " + obj.scene_len);
      lines.push("검증: " + (ok ? "OK" : "실패"));
      if(obj.verify && obj.verify.error){
        lines.push("검증 오류: " + obj.verify.error);
      }
      obj.sections.forEach(sec => {
        const place = sec.place || "";
        const time = sec.time || "";
        lines.push("");
        lines.push("[섹션 " + sec.index + "]");
        if(place) lines.push("장소: " + place);
        if(time) lines.push("시간: " + time);
        lines.push("범위: [" + sec.start + "," + sec.end + ")");
        sec.scenes.forEach(sc => {
          lines.push("");
          lines.push("(씬 " + sc.index + " [" + sc.start + "," + sc.end + "])");
          lines.push(sc.text);
        });
      });
      el.value = lines.join("\n");
    }
 
    function mergeSectionsByPlaceTime(obj){
      if(!obj || !Array.isArray(obj.sections)){
        return obj;
      }
      const merged = [];
      for(let i=0;i<obj.sections.length;i++){
        const sec = obj.sections[i];
        const place = (sec.place || "").trim();
        const time = (sec.time || "").trim();
        sec.place = place;
        sec.time = time;
        if(!merged.length){
          merged.push(sec);
          continue;
        }
        const last = merged[merged.length-1];
        const sameTime = last.time === time;
        const contiguous = last.end === sec.start;
        const samePlaceStrict = last.place === place;
        const samePlaceLoose =
          last.place && place &&
          (last.place.indexOf(place) !== -1 || place.indexOf(last.place) !== -1);
        if(contiguous && sameTime && (samePlaceStrict || samePlaceLoose)){
          const chosenPlace = last.place.length >= place.length ? last.place : place;
          last.place = chosenPlace;
          last.end = sec.end;
          if(Array.isArray(sec.scenes) && sec.scenes.length){
            if(!Array.isArray(last.scenes)){
              last.scenes = [];
            }
            last.scenes = last.scenes.concat(sec.scenes);
          }
        }else{
          merged.push(sec);
        }
      }
      obj.sections = merged;
      return obj;
    }

    async function callOpenAISections(text, apiKey, model, sceneLen){
      const system =
        "You are an assistant that edits Korean screenplays into structured sections. " +
        "You MUST deeply analyze the story flow (time, place, and episode changes) and think step by step before deciding any split. " +
        "Requirements:\n" +
        "1) First, segment the script into contiguous sections that strictly follow the original order of the text. " +
        "   Create a NEW section only when there is a clear change of PLACE or TIME, or when a new EPISODE begins that is separated by an obvious break in the story (예: '며칠이 지난', '그날 밤', 장면 전환 문장 등).\n" +
        "   If characters physically move from one place to another (예: 안채 마루 → 뒷산 기슭), split into separate sections for each place.\n" +
        "   When the opening lines are pure background narration about a future/possible place and the actual scene then starts in a different current place, treat the background as its own short section, then start a new section at the first current-place scene. " +
        "   For example, in '뒷산 기슭에 올라서면 … 그날 아침, 소이가 안채 마루에서 …', section 1 should be the 뒷산 기슭 background, and section 2 should start from '그날 아침, 소이가 안채 마루에서 …' with place='안채 마루'.\n" +
        "2) You do NOT need to create scenes/cards. Only decide the section ranges and labels (place, time). " +
        "   Our client code will later split each section into 130자 씬 단위로 자르므로, 여기서는 섹션 경계(start/end)와 장소/시간만 정확히 잡아주면 된다.\n" +
        "3) NEVER drop or reorder characters. The union of all [start,end) ranges over sections must cover the entire TEXT exactly once, without overlaps or gaps. No additions, no deletions, no paraphrasing.\n" +
        "4) For each section, set place/time to match where MOST of the concrete actions and dialogue of that section actually occur. " +
        "   The place field MUST be a physical location only (예: '안채 마루', '사랑채 마당', '부엌 앞마당', '뒷산 기슭', '개울가'). " +
        "   NEVER put character names, roles, emotions, or thematic summaries in the place field (예: '소이', '박씨 부인', '새 며느리', '갈등', '결심' 등은 place에 쓰지 말 것).\n" +
        "   When a section contains background narration about a future/possible location and actual actions/dialogue in a different current location, the place MUST follow the current location of the characters and the main dramatic beat, not the narrated future location. " +
        "   For example, in a passage like '뒷산 기슭에 올라서면 … 그날 아침, 소이가 안채 마루에서 …', the place must be '안채 마루' until the moment the characters actually move to 뒷산 기슭.\n" +
        "   If place/time cannot be clearly determined, use an empty string.\n" +
        "5) When a physical location is the same, keep the exact same place phrase consistently (예: '부엌 앞마당' 구간에서는 '부엌', '마당' 등으로 이름을 바꾸지 말 것).\n" +
        "6) Do NOT create multiple adjacent sections that share the same place and time; such contiguous text must be represented as one section.\n" +
        "7) Return ONLY valid JSON (no markdown, no comments).\n" +
        "8) JSON schema:\n" +
        "{\n" +
        "  \"scene_len\": number,              // the target length actually used per card (echo SCENE_LEN)\n" +
        "  \"sections\": [\n" +
        "    {\n" +
        "      \"index\": number,             // 1-based section index in original order\n" +
        "      \"place\": string,             // short Korean description of place\n" +
        "      \"time\": string,              // short Korean description of time\n" +
        "      \"start\": number,             // start offset in the original string (inclusive)\n" +
        "      \"end\": number                // end offset in the original string (exclusive)\n" +
        "    }\n" +
        "  ]\n" +
        "}\n" +
        "All indices must be JavaScript string character offsets into the provided TEXT. " +
        "Sections must be ordered, non-overlapping, and together must cover the entire TEXT exactly with no gaps.";

      const user =
        "TEXT:\n" + text + "\n\n" +
        "SCENE_LEN: " + sceneLen + "\n" +
        "Return JSON only, following the specified schema.";
 
      const body = {
        model: model,
        messages: [
          {role:"system", content:system},
          {role:"user", content:user}
        ],
        temperature:0
      };
 
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer " + apiKey
        },
        body: JSON.stringify(body)
      });
 
      if(!res.ok){
        const errText = await res.text().catch(() => "");
        throw new Error("OpenAI 오류: " + res.status + " " + errText);
      }
 
      const data = await res.json();
      const content = data.choices[0].message.content;
      const obj = extractJson(content);
      if(!obj || typeof obj !== "object" || !Array.isArray(obj.sections)){
        throw new Error("모델 출력이 잘못된 구조입니다");
      }
      return obj;
    }
 
    async function run(){
      const text = qs("input").value;
      const apiKey = qs("apiKey").value.trim();
      let model = qs("model").value.trim() || "gpt-4o-mini";
      const sceneLen = parseInt(qs("sceneLen").value || "130", 10);
 
      if(!text){
        setStatus("대본을 입력해줘", "bad");
        return;
      }
      if(!apiKey){
        setStatus("OpenAI API Key를 입력해줘", "bad");
        return;
      }
 
      setStatus("OpenAI에 섹션 나누기 요청 중...", "");
      qs("runBtn").disabled = true;
      try{
        localStorage.setItem("openai_model", model);
        localStorage.setItem("scene_len", String(sceneLen));
 
        const gpt = await callOpenAISections(text, apiKey, model, sceneLen);
        const ranges = Array.isArray(gpt.sections) ? gpt.sections.map(sec => ({
          start: sec.start,
          end: sec.end,
          place: sec.place,
          time: sec.time
        })) : [];
        let out = buildOutput(text, ranges, sceneLen);
        out = mergeSectionsByPlaceTime(out);
        out.scene_len = typeof out.scene_len === "number" ? out.scene_len : sceneLen;
        out.section_count = Array.isArray(out.sections) ? out.sections.length : 0;
        if(Array.isArray(out.sections)){
          out.sections.forEach((sec, idx) => {
            sec.index = sec.index || (idx + 1);
            if(Array.isArray(sec.scenes)){
              sec.scene_count = sec.scenes.length;
              sec.scenes.forEach((sc, i) => {
                sc.index = sc.index || (i + 1);
              });
            }else{
              sec.scene_count = 0;
              sec.scenes = [];
            }
          });
        }
        const recon = reconstruct(out);
        const ok = recon === text;
        out.verify = {
          ok,
          source: "openai",
          error: ok ? null : "reconstructed text differs from input"
        };
        renderResult(out);
        lastResult = {obj: out, text};
        setStatus(ok ? "완료 (검증 OK)" : "완료 (검증 실패: 씬 합친 텍스트가 원문과 다름)", ok ? "ok" : "bad");
      }catch(e){
        setStatus(String(e), "bad");
        qs("output").textContent = "에러: " + String(e);
      }finally{
        qs("runBtn").disabled = false;
      }
    }
 
    (function init(){
      const savedKey = localStorage.getItem("openai_key");
      const savedModel = localStorage.getItem("openai_model");
      const savedLen = localStorage.getItem("scene_len");
      if(savedKey){
        qs("apiKey").value = savedKey;
      }
      if(savedModel){
        qs("model").value = savedModel;
      }
      if(savedLen){
        qs("sceneLen").value = savedLen;
      }
    })();
 
    qs("runBtn").addEventListener("click", run);
    qs("downloadTxtBtn").addEventListener("click", () => {
      if(!lastResult || !lastResult.obj){
        setStatus("먼저 분석을 실행해줘", "bad");
        return;
      }
      const txt = buildTxtExport(lastResult.obj, lastResult.text);
      downloadTextFile("scenes.txt", txt);
      setStatus("TXT 내보내기 완료", "ok");
    });
    qs("saveKeyBtn").addEventListener("click", () => {
      const key = qs("apiKey").value.trim();
      if(key){
        localStorage.setItem("openai_key", key);
        setStatus("API Key 저장됨", "ok");
      }else{
        localStorage.removeItem("openai_key");
        setStatus("API Key 비어 있음", "bad");
      }
    });
  </script>
</body>
</html>
