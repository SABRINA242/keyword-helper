<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>야담 대본 분리 도구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c09;
    --surface: #1a1610;
    --surface2: #231f18;
    --border: #3a3020;
    --border2: #4e4330;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --amber: #d4882a;
    --text: #e8dfc8;
    --text-muted: #9a8f78;
    --text-dim: #5c5445;
    --red: #c44;
    --green: #5a9e6f;
    --section-colors: #c9a84c, #8fb88f, #7aadcc, #cc8f7a, #a87acc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Decorative top border */
  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--amber), var(--gold), transparent);
  }

  header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::before {
    content: '◈';
    display: block;
    color: var(--gold);
    font-size: 20px;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  header h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  header p {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px 20px 80px;
  }

  /* API Key Section */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .api-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    color: var(--text-muted);
    font-size: 13px;
    transition: color 0.2s;
  }

  .api-toggle:hover { color: var(--text); }
  .api-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  .api-toggle.open .arrow { transform: rotate(90deg); }
  .api-toggle .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .api-toggle .dot.active { background: var(--green); }

  .api-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  .api-body.open { display: block; }

  .api-body label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin: 12px 0 6px;
    letter-spacing: 1px;
  }

  .api-body input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-body input:focus { border-color: var(--gold); }

  .api-help-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    color: var(--gold2);
    text-decoration: none;
    border-bottom: 1px dashed rgba(232,201,106,0.45);
    padding-bottom: 2px;
  }

  .api-help-link:hover {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Script Input */
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--border2); }

  .char-count {
    text-align: right;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 3px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: var(--gold);
    color: #1a1610;
    font-weight: 700;
  }

  .btn-primary:hover { background: var(--gold2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    font-size: 12px;
    padding: 7px 14px;
  }

  .btn-secondary:hover { background: rgba(201,168,76,0.1); }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-download {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    font-size: 13px;
  }

  .btn-download:hover { border-color: var(--gold); color: var(--gold); }

  .btn-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* Loading spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  /* Results area */
  #results { margin-top: 8px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .results-title {
    font-family: 'Gowun Batang', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 2px;
  }

  /* Section card */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .section-badge {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #1a1610;
    margin-top: 2px;
  }

  .section-meta {
    flex: 1;
    min-width: 0;
  }

  .section-title {
    font-family: 'Gowun Batang', serif;
    font-size: 16px;
    color: var(--text);
    font-weight: 700;
    line-height: 1.4;
  }

  .section-title-edit {
    font-family: 'Gowun Batang', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--gold2);
    padding: 2px 8px;
    outline: none;
    width: 100%;
    box-sizing: border-box;
  }

  .section-title-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .edit-icon {
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
    user-select: none;
  }

  .section-card-header:hover .edit-icon { opacity: 1; }

  .section-tags {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-color: var(--border2);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .tag:hover { border-color: var(--gold); color: var(--gold); }

  .tag-edit {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 20px;
    border: 1px solid var(--gold);
    background: rgba(201,168,76,0.1);
    color: var(--gold2);
    outline: none;
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.5px;
    width: auto;
    min-width: 60px;
    max-width: 200px;
  }

  .section-toggle-icon {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .section-card.collapsed .section-toggle-icon { transform: rotate(-90deg); }

  .section-body {
    padding: 0;
  }

  .section-card.collapsed .section-body { display: none; }

  /* Script text in section */
  .script-text {
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    border-bottom: 1px solid var(--border);
    max-height: 300px;
    overflow-y: auto;
  }

  .script-text::-webkit-scrollbar { width: 4px; }
  .script-text::-webkit-scrollbar-track { background: transparent; }
  .script-text::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .section-actions {
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .scene-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* Scene list */
  .scenes-container {
    border-top: 1px solid var(--border);
  }

  .scene-item {
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  .scene-item:last-child { border-bottom: none; }

  .scene-num {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
    font-family: monospace;
    padding-top: 2px;
    letter-spacing: 1px;
    min-width: 32px;
  }

  .scene-content {
    flex: 1;
    min-width: 0;
  }

  .scene-label {
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .scene-chars {
    font-size: 11px;
    color: var(--text-dim);
    font-family: monospace;
    margin-left: auto;
  }

  .scene-text {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Error message */
  .error-msg {
    background: rgba(204,68,68,0.1);
    border: 1px solid rgba(204,68,68,0.3);
    border-radius: 3px;
    padding: 12px 16px;
    color: #e08888;
    font-size: 13px;
    margin-top: 12px;
  }

  /* Status message */
  .status-msg {
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 0;
  }

  /* Color cycle for sections */
  .color-0 { background: #c9a84c; }
  .color-1 { background: #6a9e7a; }
  .color-2 { background: #5a9ab5; }
  .color-3 { background: #b57a5a; }
  .color-4 { background: #8a6ab5; }

  /* ── 섹션 수동 분리 모드 ── */
  .split-mode {
    border-top: 1px solid var(--border);
    padding: 12px 18px;
    background: rgba(0,0,0,0.2);
  }

  .split-mode-hint {
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .split-paragraph {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    padding: 8px 0;
    white-space: pre-wrap;
  }

  .split-sentence {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    display: block;
    padding: 4px 0;
  }

  .split-point {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.2s;
    margin: 2px 0;
  }

  .split-point:hover { opacity: 1; }

  .split-point-line {
    flex: 1;
    height: 1px;
    background: var(--amber);
  }

  .split-point-btn {
    font-size: 11px;
    color: var(--amber);
    border: 1px solid var(--amber);
    border-radius: 20px;
    padding: 2px 10px;
    white-space: nowrap;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
  }

  .split-mode-cancel {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    text-decoration: underline;
  }

  .split-mode-cancel:hover { color: var(--text-muted); }

  .scene-split-btn {
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 1px 6px;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    transition: color 0.2s, border-color 0.2s;
  }

  .scene-split-btn:hover { color: var(--amber); border-color: var(--amber); }

  .scene-split-mode {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 8px;
  }

  .scene-split-hint {
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .scene-split-sentence {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    display: block;
    padding: 2px 0;
  }

  .scene-split-cancel {
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    text-decoration: underline;
    margin-top: 6px;
    display: inline-block;
  }

  .scene-split-cancel:hover { color: var(--text-muted); }
  .scene-merge-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 18px 4px 52px;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.2s;
  }

  .scene-merge-row:hover { opacity: 1; }

  .scene-merge-line {
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .scene-merge-btn {
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2px 10px;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    white-space: nowrap;
  }

  .scene-merge-row:hover .scene-merge-btn {
    color: var(--gold);
    border-color: var(--gold);
  }

  /* Responsive */
  @media (max-width: 600px) {
    header h1 { font-size: 22px; }
    .section-card-header { padding: 12px 14px; }
    .script-text { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<header>
  <h1>야담 대본 분리 도구</h1>
  <p>섹션 자동 분리 &nbsp;·&nbsp; 씬 세분화 &nbsp;·&nbsp; 텍스트 파일 다운로드</p>
</header>

<div class="container">

  <!-- API Key -->
  <div class="api-section">
    <div class="api-toggle" id="apiToggle" onclick="toggleApiPanel()">
      <div class="dot" id="apiDot"></div>
      <span>OpenAI API 키 설정</span>
      <span class="arrow" id="apiArrow">▶</span>
    </div>
    <div class="api-body" id="apiBody">
      <label>API KEY (sk-...)</label>
      <input type="password" id="apiKey" placeholder="sk-..." oninput="onApiKeyChange()">
      <a class="api-help-link" href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer">
        OpenAI API 키 받으러 가기
      </a>
    </div>
  </div>

  <!-- Script Input -->
  <div class="section-label">대본 입력</div>
  <textarea id="scriptInput" rows="18" placeholder="여기에 야담 대본을 붙여넣으세요...&#10;&#10;(23,000자 이상도 괜찮습니다)" oninput="updateCharCount()"></textarea>
  <div class="char-count"><span id="charCount">0</span>자</div>

  <div class="btn-row">
    <button class="btn btn-primary" id="splitBtn" onclick="splitSections()" disabled>
      <span class="spinner" id="splitSpinner"></span>
      <span id="splitBtnText">섹션 자동 분리</span>
    </button>
    <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)">
      씬 글자수
      <input type="number" id="globalMinChar" value="110" min="50" max="500"
        style="width:56px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;
               padding:4px 6px;color:var(--text);font-size:12px;font-family:monospace;outline:none;text-align:center">
      ~
      <input type="number" id="globalMaxChar" value="200" min="100" max="1000"
        style="width:56px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;
               padding:4px 6px;color:var(--text);font-size:12px;font-family:monospace;outline:none;text-align:center">
      자
    </span>
    <span class="status-msg" id="statusMsg"></span>
    <button class="btn btn-secondary" onclick="resetAll()" style="margin-left:auto;font-size:12px;border-color:var(--red);color:var(--red);padding:6px 14px">↺ 새로 시작</button>
  </div>

  <div class="btn-row" style="margin-top:10px;align-items:flex-end">
    <span style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text-muted)">
      다운로드 폴더명
      <input type="text" id="downloadFolderName" value="대본분리" placeholder="대본분리"
        oninput="onDownloadFolderNameChange()"
        style="width:180px;background:var(--surface);border:1px solid var(--border2);border-radius:3px;
               padding:8px 10px;color:var(--text);font-size:13px;font-family:'Noto Serif KR', serif;outline:none">
    </span>
    <button class="btn btn-secondary" onclick="chooseDownloadRoot()" style="padding:8px 14px">저장 위치 변경</button>
    <span class="status-msg" id="downloadPathStatus">기본 브라우저 다운로드 사용 중, 언제든 변경 가능</span>
  </div>
  <div class="status-msg" id="downloadCurrentPath" style="margin-top:6px;color:var(--text-muted);font-family:monospace"></div>
  <div class="status-msg" id="downloadResultMsg" style="margin-top:6px;color:var(--gold)"></div>

  <div id="errorMsg"></div>

  <!-- Results -->
  <div id="results"></div>



</div>

<script>
  let sections = [];
  let downloadRootHandle = null;
  const DOWNLOAD_HANDLE_DB = 'yadamDownloadDB';
  const DOWNLOAD_HANDLE_STORE = 'handles';
  const DOWNLOAD_HANDLE_KEY = 'downloadRoot';

  // ─── 저장 / 복원 ─────────────────────────────────────────────
  function saveState() {
    try {
      localStorage.setItem('yadam_script', document.getElementById('scriptInput').value);
      localStorage.setItem('yadam_sections', JSON.stringify(sections));
      localStorage.setItem('yadam_minChar', document.getElementById('globalMinChar').value);
      localStorage.setItem('yadam_maxChar', document.getElementById('globalMaxChar').value);
      localStorage.setItem('yadam_downloadFolderName', document.getElementById('downloadFolderName').value);
    } catch(e) {}
  }

  function resetAll() {
    if (!confirm('모든 작업 내용이 삭제됩니다. 새로 시작할까요?')) return;
    localStorage.removeItem('yadam_script');
    localStorage.removeItem('yadam_sections');
    sections = [];
    document.getElementById('scriptInput').value = '';
    document.getElementById('charCount').textContent = '0';
    document.getElementById('results').innerHTML = '';
    document.getElementById('statusMsg').textContent = '';
    showError('');
    checkReady();
  }

  // 저장된 API 키 + 작업 복원
  window.addEventListener('DOMContentLoaded', async () => {
    // API 키
    const savedKey = localStorage.getItem('openai_api_key');
    if (savedKey) {
      document.getElementById('apiKey').value = savedKey;
      document.getElementById('apiDot').classList.add('active');
    }
    // 글자수 설정
    const minChar = localStorage.getItem('yadam_minChar');
    const maxChar = localStorage.getItem('yadam_maxChar');
    if (minChar) document.getElementById('globalMinChar').value = minChar;
    if (maxChar) document.getElementById('globalMaxChar').value = maxChar;
    const savedDownloadFolderName = localStorage.getItem('yadam_downloadFolderName');

      document.getElementById('charCount').textContent = savedScript.length.toLocaleString();
      checkReady();

    // 섹션 데이터
    const savedSections = localStorage.getItem('yadam_sections');
    if (savedSections) {
      try {
        sections = JSON.parse(savedSections);
        if (sections.length > 0) {
          // 복원 시 씬 글자수 후처리 재적용
          const minChar = parseInt(localStorage.getItem('yadam_minChar')) || 110;
          sections.forEach(s => {
            if (s.scenes && s.scenes.length) {
              s.scenes = mergeShortScenes(s.scenes, minChar);
            }
          });
          renderSections();
          document.getElementById('statusMsg').textContent = `이전 작업 복원 완료 (${sections.length}개 섹션)`;
        }
      } catch(e) { sections = []; }
    }
    await restoreDownloadRootHandle();
    updateDownloadPathStatus();
  });

  function openDownloadHandleDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DOWNLOAD_HANDLE_DB, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DOWNLOAD_HANDLE_STORE)) {
          db.createObjectStore(DOWNLOAD_HANDLE_STORE);
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function saveDownloadRootHandle(handle) {
    if (!('indexedDB' in window)) return;
    const db = await openDownloadHandleDb();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DOWNLOAD_HANDLE_STORE, 'readwrite');
      tx.objectStore(DOWNLOAD_HANDLE_STORE).put(handle, DOWNLOAD_HANDLE_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
    db.close();
  }

  async function loadDownloadRootHandle() {
    if (!('indexedDB' in window)) return null;
    const db = await openDownloadHandleDb();
    const handle = await new Promise((resolve, reject) => {
      const tx = db.transaction(DOWNLOAD_HANDLE_STORE, 'readonly');
      const request = tx.objectStore(DOWNLOAD_HANDLE_STORE).get(DOWNLOAD_HANDLE_KEY);
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => reject(request.error);
    });
    db.close();
    return handle;
  }

  async function restoreDownloadRootHandle() {
    if (!('showDirectoryPicker' in window)) return;
    try {
      const savedHandle = await loadDownloadRootHandle();
      if (!savedHandle) return;

      const permission = await savedHandle.queryPermission({ mode: 'readwrite' });
      if (permission === 'granted') {
        downloadRootHandle = savedHandle;
        setSavedDownloadRootName(savedHandle.name);
      }
    } catch (e) {
      console.error(e);
    }
  }

  async function callGPT(systemPrompt, userContent, isLarge) {
    const key = document.getElementById('apiKey').value.trim();
    const body = {
      model: 'gpt-4o-mini',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userContent }
      ],
      temperature: 0.2,
      max_tokens: isLarge ? 12000 : 4000
    };

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }

    const data = await res.json();
    return data.choices[0].message.content;
  }

  function parseJSON(raw) {
    const cleaned = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    try {
      return JSON.parse(cleaned);
    } catch (e) {
      // 응답이 잘린 경우 안내
      throw new Error('GPT 응답이 너무 길어 잘렸습니다. 대본을 더 짧게 나눠서 입력해 주세요. (원인: ' + e.message + ')');
    }
  }

  // ─── start_text 기반으로 원본 대본 텍스트 분리 ────────────────
  function sliceSectionsByStartText(fullText, sectionMetas) {
    const positions = [];

    sectionMetas.forEach((meta, i) => {
      const raw = (meta.start_text || '').trim();
      if (!raw) return;

      // 1차: 그대로 매칭
      let pos = fullText.indexOf(raw.slice(0, 15));

      // 2차: 공백 정규화 후 매칭
      if (pos === -1) {
        const normalized = raw.replace(/\s+/g, ' ').slice(0, 15);
        const normalizedFull = fullText.replace(/\s+/g, ' ');
        const nPos = normalizedFull.indexOf(normalized);
        if (nPos !== -1) {
          // 정규화된 위치를 원본 위치로 근사
          pos = fullText.indexOf(raw.slice(0, 8));
        }
      }

      // 3차: 더 짧게
      if (pos === -1) pos = fullText.indexOf(raw.slice(0, 8));
      if (pos === -1) pos = fullText.indexOf(raw.slice(0, 5));

      if (pos !== -1) positions.push({ idx: i, pos });
    });

    // 첫 섹션이 위치 0이 아니면 맨 앞을 첫 섹션으로 강제
    positions.sort((a, b) => a.pos - b.pos);
    if (positions.length > 0 && positions[0].pos > 0) {
      positions[0].pos = 0;
    }

    if (positions.length === 0) {
      // 매칭 전혀 안 되면 균등 분할 fallback
      const chunkSize = Math.ceil(fullText.length / sectionMetas.length);
      return sectionMetas.map((meta, i) => ({
        id: meta.id || (i + 1),
        title: meta.title,
        place: meta.place,
        time: meta.time,
        episode_note: meta.episode_note,
        text: fullText.slice(i * chunkSize, (i + 1) * chunkSize).trim(),
        scenes: []
      }));
    }

    return positions.map((p, i) => {
      const start = p.pos;
      const end = i + 1 < positions.length ? positions[i + 1].pos : fullText.length;
      const meta = sectionMetas[p.idx];
      return {
        id: meta.id || (i + 1),
        title: meta.title,
        place: meta.place,
        time: meta.time,
        episode_note: meta.episode_note,
        text: fullText.slice(start, end).trim(),
        scenes: []
      };
    });
  }

  // ─── SECTION SPLIT ───────────────────────────────────────────
  async function splitSections() {
    const script = document.getElementById('scriptInput').value.trim();
    showError('');
    document.getElementById('results').innerHTML = '';
    sections = [];

    const btn = document.getElementById('splitBtn');
    const spinner = document.getElementById('splitSpinner');
    const btnText = document.getElementById('splitBtnText');
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btnText.textContent = '분석 중...';
    document.getElementById('statusMsg').textContent = '대본을 분석하고 있습니다...';

    const systemPrompt = `당신은 조선시대 야담(민담) 대본을 분석하는 전문가입니다.
아래 대본을 읽고 섹션을 나누어 주세요.

섹션 분리 기준 (하나라도 해당되면 무조건 새 섹션):
1. 【장소 변경】 물리적 공간이 달라지면 반드시 새 섹션. 예: 안채→뒷산, 사랑채→사랑방, 장터→집 등 조금만 달라져도 분리
2. 【시간 변경】 아침/낮/저녁/다음날 등 시간대가 바뀔 때
3. 【에피소드 전환】 완전히 새로운 사건이나 이야기 흐름으로 넘어갈 때

주의:
- 같은 에피소드라도 장소가 달라지면 반드시 분리
- 인물들이 이동하는 장면은 이동 후 도착한 곳을 새 섹션으로
- 텍스트는 출력하지 말 것. 각 섹션의 시작 부분 앞 20글자만 "start_text"로 출력
- 반드시 JSON만 출력, 다른 설명 없음

출력 형식 (JSON):
{
  "sections": [
    {
      "id": 1,
      "title": "섹션 제목 (장소/상황 요약)",
      "place": "장소 (구체적으로)",
      "time": "시간대",
      "episode_note": "이 섹션의 에피소드 흐름 한 줄 요약",
      "start_text": "이 섹션이 시작되는 부분의 첫 20글자 (원문 그대로)"
    }
  ]
}`;

    try {
      const raw = await callGPT(systemPrompt, `대본:\n\n${script}`, true);
      const parsed = parseJSON(raw);

      // GPT가 준 start_text로 원본에서 위치를 찾아 텍스트 직접 분리
      sections = sliceSectionsByStartText(script, parsed.sections);
      renderSections();
      document.getElementById('statusMsg').textContent = `${sections.length}개 섹션으로 분리 완료`;
    } catch (e) {
      showError(e.message);
      document.getElementById('statusMsg').textContent = '';
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '섹션 자동 분리';
      checkReady();
    }
  }

  // ─── 씬 글자수 후처리 - 미달 씬 자동 합치고 재분리 ──────────
  function mergeShortScenes(scenes, minChar) {
    if (!scenes || scenes.length === 0) return scenes;
    const maxChar = parseInt(document.getElementById('globalMaxChar')?.value) || 200;

    // 1단계: 미달 씬 반복 합치기 (확실하게 없어질 때까지)
    let result = scenes.map(sc => ({ ...sc, text: (sc.text || '').trim() }));

    let safety = 0;
    while (safety++ < 50) {
      const shortIdx = result.findIndex(sc => sc.text.length < minChar);
      if (shortIdx === -1) break; // 미달 씬 없으면 종료

      // 앞 씬 우선, 없으면 뒤 씬
      const mergeWith = shortIdx > 0 ? shortIdx - 1 : shortIdx + 1;
      if (mergeWith >= result.length) break;

      const a = Math.min(shortIdx, mergeWith);
      const b = Math.max(shortIdx, mergeWith);
      result.splice(a, 2, {
        ...result[a],
        text: (result[a].text + ' ' + result[b].text).trim(),
        label: result[a].label
      });
    }

    // 2단계: 최댓값 초과 씬은 문장 단위로 재분리
    const final = [];
    result.forEach(sc => {
      if (sc.text.length <= maxChar) {
        final.push(sc);
        return;
      }
      const sents = splitSentences(sc.text);
      if (sents.length < 2) {
        // 문장 분리 불가 → maxChar 기준으로 강제 분리
        let start = 0;
        while (start < sc.text.length) {
          const chunk = sc.text.slice(start, start + maxChar).trim();
          if (chunk.length < minChar && final.length > 0) {
            final[final.length - 1].text += ' ' + chunk;
          } else if (chunk) {
            final.push({ ...sc, text: chunk });
          }
          start += maxChar;
        }
        return;
      }
      let chunk = '';
      sents.forEach((sent, idx) => {
        const candidate = chunk ? chunk + ' ' + sent : sent;
        if (candidate.length > maxChar && chunk.length >= minChar) {
          final.push({ ...sc, text: chunk.trim() });
          chunk = sent;
        } else {
          chunk = candidate;
        }
        if (idx === sents.length - 1 && chunk) {
          if (chunk.trim().length < minChar && final.length > 0) {
            final[final.length - 1].text += ' ' + chunk.trim();
          } else {
            final.push({ ...sc, text: chunk.trim() });
          }
        }
      });
    });

    // 3단계: 재분리 후 또 미달 생긴 거 다시 합치기
    let safety2 = 0;
    while (safety2++ < 50) {
      const shortIdx = final.findIndex(sc => sc.text.length < minChar);
      if (shortIdx === -1) break;
      const mergeWith = shortIdx > 0 ? shortIdx - 1 : shortIdx + 1;
      if (mergeWith >= final.length) break;
      const a = Math.min(shortIdx, mergeWith);
      const b = Math.max(shortIdx, mergeWith);
      final.splice(a, 2, {
        ...final[a],
        text: (final[a].text + ' ' + final[b].text).trim(),
        label: final[a].label
      });
    }

    // 번호 재정렬
    final.forEach((sc, i) => { sc.num = i + 1; });
    return final;
  }

  function getSceneLayoutCount(layoutValue) {
    const layoutMap = {
      '1': 1,
      '2by2': 4,
      '3by2': 6,
      '3by3': 9
    };
    return layoutMap[layoutValue] || 1;
  }

  function buildScenesFromSentencePlan(sentenceChunks, plannedScenes, targetCount, section) {
    if (targetCount === 1) {
      return [{
        num: 1,
        label: (section.title || '전체 장면').trim(),
        text: section.text
      }];
    }

    if (!Array.isArray(plannedScenes) || plannedScenes.length !== targetCount) {
      throw new Error(`선택한 옵션에 맞춰 정확히 ${targetCount}개 씬 계획을 만들지 못했습니다.`);
    }

    const totalSentences = sentenceChunks.length;
    let previousEnd = 0;
    const result = plannedScenes.map((scene, idx) => {
      const rawEnd = parseInt(scene.end_sentence, 10);
      const endSentence = Number.isNaN(rawEnd) ? -1 : rawEnd;

      if (endSentence <= previousEnd || endSentence > totalSentences) {
        throw new Error('씬 경계 계산이 잘못되어 다시 시도해 주세요.');
      }

      const text = sentenceChunks.slice(previousEnd, endSentence).join('');
      if (!text) {
        throw new Error('씬 텍스트가 비어 있어 다시 시도해 주세요.');
      }

      previousEnd = endSentence;
      return {
        num: idx + 1,
        label: (scene.label || `씬 ${idx + 1}`).trim(),
        text
      };
    });

    if (previousEnd !== totalSentences) {
      throw new Error('대본 전체가 씬으로 모두 연결되지 않았습니다. 다시 시도해 주세요.');
    }

    return result;
  }

  function renumberAllScenes() {
    const startNum = parseInt(document.getElementById('sceneStartNum').value) || 1;
    let counter = startNum;

    sections.forEach(s => {

      `씬 번호 재매기기 완료: ${String(startNum).padStart(3,'0')} ~ ${String(endNum).padStart(3,'0')} (총 ${total}개)`;
  }

  // ─── 문장 분리 유틸 ──────────────────────────────────────────
  function splitSentences(text) {
    const result = [];
    let current = '';

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      current += ch;

      const isBreak =
        ch === '.' || ch === '!' || ch === '?' ||
        ch === '"' || ch === '\u201d' ||
        ch === "'" || ch === '\u2019';

      if (isBreak) {
        // 말줄임표(...) 무시 - 다음 문자도 .이면 건너뜀
        const next = text[i + 1];
        if (ch === '.' && (next === '.' || text[i - 1] === '.')) continue;

        if (!next || next === ' ' || next === '\n' || next === '\r') {
          const trimmed = current.trim();
          if (trimmed.length > 0) result.push(trimmed);
          current = '';
          while (text[i + 1] === ' ' || text[i + 1] === '\n' || text[i + 1] === '\r') i++;
        }
      }
    }

    if (current.trim().length > 0) result.push(current.trim());
    return result;
  }

  function splitSentenceChunks(text) {
    const result = [];
    let current = '';

    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      current += ch;

      const isBreak =
        ch === '.' || ch === '!' || ch === '?' ||
        ch === '"' || ch === '\u201d' ||
        ch === "'" || ch === '\u2019';

      if (isBreak) {
        const next = text[i + 1];
        if (ch === '.' && (next === '.' || text[i - 1] === '.')) continue;

        if (!next || next === ' ' || next === '\n' || next === '\r') {
          while (text[i + 1] === ' ' || text[i + 1] === '\n' || text[i + 1] === '\r') {
            current += text[i + 1];
            i++;
          }
          if (current.length > 0) result.push(current);
          current = '';
        }
      }
    }

    if (current.length > 0) result.push(current);
    return result;
  }

  function joinSectionTexts(textA, textB) {
    const left = textA || '';
    const right = textB || '';
    if (!left) return right;
    if (!right) return left;

    const leftEndsWithWhitespace = /\s$/.test(left);
    const rightStartsWithWhitespace = /^\s/.test(right);

    if (leftEndsWithWhitespace || rightStartsWithWhitespace) {
      return left + right;
    }

    return left + '\n' + right;
  }

    function save() {
      const val = input.value.trim() || current;
      section[field] = val;
      tagEl.innerHTML = `${icon} ${escHtml(val)}`;
    }

    input.addEventListener('blur', save);
    input.addEventListener('keydown', ev => {

  // ─── 씬 ✂ 메뉴 ──────────────────────────────────────────────
  function showSceneSplitMode(sectionId, sceneNum) {

  function hideSceneSplitMode(sectionId, sceneNum) {

  // 합치기만 (나누기 없이)
  function mergeSceneOnly(sectionId, sceneNum, direction) {
    const section = sections.find(s => s.id === sectionId);
    if (!section || !section.scenes) return;
    const scIdx = section.scenes.findIndex(sc => sc.num === sceneNum);
    if (scIdx === -1) return;

    const targetIdx = direction === 'prev' ? scIdx - 1 : scIdx + 1;
    if (targetIdx < 0 || targetIdx >= section.scenes.length) return;

    const idxA = Math.min(scIdx, targetIdx);
    const idxB = Math.max(scIdx, targetIdx);
    const mergedText = section.scenes[idxA].text + ' ' + section.scenes[idxB].text;
    const merged = { num: 0, label: section.scenes[idxA].label, text: mergedText };

    section.scenes.splice(idxA, 2, merged);
    section.scenes.forEach((sc, i) => { sc.num = i + 1; });
    renderScenes(sectionId, section.scenes);
    document.querySelector(`#scene-count-${sectionId}`).textContent = `${section.scenes.length}개 씬`;
  }

  // 합치고 → 직접 나누기 모드 진입
  function mergeSceneThenSplit(sectionId, sceneNum, direction) {
    const section = sections.find(s => s.id === sectionId);
    if (!section || !section.scenes) return;
    const scIdx = section.scenes.findIndex(sc => sc.num === sceneNum);
    if (scIdx === -1) return;

    const targetIdx = direction === 'prev' ? scIdx - 1 : scIdx + 1;
    if (targetIdx < 0 || targetIdx >= section.scenes.length) return;

    const idxA = Math.min(scIdx, targetIdx);
    const idxB = Math.max(scIdx, targetIdx);
    const mergedText = section.scenes[idxA].text + ' ' + section.scenes[idxB].text;
    const merged = { num: 0, label: section.scenes[idxA].label, text: mergedText };

    section.scenes.splice(idxA, 2, merged);
    section.scenes.forEach((sc, i) => { sc.num = i + 1; });
    renderScenes(sectionId, section.scenes);
    document.querySelector(`#scene-count-${sectionId}`).textContent = `${section.scenes.length}개 씬`;

    // 합쳐진 씬으로 바로 직접 나누기 모드 열기
    const newNum = section.scenes[idxA].num;
    setTimeout(() => showSceneManualSplit(sectionId, newNum), 50);

  // 문장 단위 직접 나누기 모드
  function showSceneManualSplit(sectionId, sceneNum) {
    const section = sections.find(s => s.id === sectionId);
    if (!section || !section.scenes) return;
    const scene = section.scenes.find(sc => sc.num === sceneNum);
    if (!scene) return;

    const container = document.getElementById(`scene-split-mode-${sectionId}-${sceneNum}`);
    const sentences = splitSentences(scene.text);

    if (sentences.length < 2) {
      container.innerHTML = `<div class="scene-split-mode">

        <span class="scene-split-cancel" onclick="hideSceneSplitMode(${sectionId}, ${sceneNum})">✕ 닫기</span>
      </div>`;
      return;
    }

    let html = `<div class="scene-split-mode">
      <div class="scene-split-hint">✂ 나누고 싶은 문장 사이를 클릭하세요</div>`;

    sentences.forEach((sent, idx) => {
      html += `<span class="scene-split-sentence">${escHtml(sent)}</span>`;

        html += `
        <div class="split-point" onclick="doSceneManualSplit(${sectionId}, ${sceneNum}, ${idx + 1})">

      }
    });

    html += `<span class="scene-split-cancel" onclick="hideSceneSplitMode(${sectionId}, ${sceneNum})">✕ 취소</span></div>`;
    container.innerHTML = html;
  }

  // 선택 위치에서 씬 나누기
  function doSceneManualSplit(sectionId, sceneNum, splitAfterIdx) {
    const section = sections.find(s => s.id === sectionId);
    if (!section || !section.scenes) return;
    const scIdx = section.scenes.findIndex(sc => sc.num === sceneNum);
    if (scIdx === -1) return;
    const scene = section.scenes[scIdx];

    const sentences = splitSentences(scene.text);
    const textA = sentences.slice(0, splitAfterIdx).join(' ');
    const textB = sentences.slice(splitAfterIdx).join(' ');

    const sceneA = { ...scene, text: textA };
    const sceneB = { ...scene, num: sceneNum + 0.5, label: scene.label, text: textB };

    section.scenes.splice(scIdx, 1, sceneA, sceneB);
    section.scenes.forEach((sc, i) => { sc.num = i + 1; });
    renderScenes(sectionId, section.scenes);
    document.querySelector(`#scene-count-${sectionId}`).textContent = `${section.scenes.length}개 씬`;
  }

  // ─── 섹션 합치기 ─────────────────────────────────────────────
  function showSectionMergeMenu(sectionId) {
    const sIdx = sections.findIndex(s => s.id === sectionId);
    if (sIdx === -1) return;
    const container = document.getElementById(`section-merge-menu-${sectionId}`);

    const hasPrev = sIdx > 0;
    const hasNext = sIdx < sections.length - 1;

    let html = `<div class="split-mode">
      <div class="split-mode-hint">⊕ 어느 섹션과 합칠까요?</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">`;

    if (hasPrev) html += `<button class="split-point-btn" style="padding:5px 14px"
        onclick="doSectionMerge(${sectionId}, 'prev')">↑ 위 섹션과 합치기</button>`;
    if (hasNext) html += `<button class="split-point-btn" style="padding:5px 14px"
        onclick="doSectionMerge(${sectionId}, 'next')">↓ 아래 섹션과 합치기</button>`;
    if (!hasPrev && !hasNext) html += `<span style="font-size:12px;color:var(--text-dim)">섹션이 1개뿐이라 합칠 수 없습니다.</span>`;

    html += `</div>
      <div class="split-mode-cancel" onclick="hideSectionMergeMenu(${sectionId})">✕ 취소</div>
    </div>`;
    container.innerHTML = html;
  }

  function hideSectionMergeMenu(sectionId) {
    const el = document.getElementById(`section-merge-menu-${sectionId}`);
    if (el) el.innerHTML = '';
  }

  function doSectionMerge(sectionId, direction) {
    const sIdx = sections.findIndex(s => s.id === sectionId);
    if (sIdx === -1) return;

    const targetIdx = direction === 'prev' ? sIdx - 1 : sIdx + 1;
    if (targetIdx < 0 || targetIdx >= sections.length) return;

    const idxA = Math.min(sIdx, targetIdx);
    const idxB = Math.max(sIdx, targetIdx);
    const secA = sections[idxA];
    const secB = sections[idxB];

    const merged = {
      ...secA,
      title: secA.text.length >= secB.text.length ? secA.title : secB.title,
      text: joinSectionTexts(secA.text, secB.text),
      scenes: [...(secA.scenes || []), ...(secB.scenes || [])],
      sceneLayoutOption: ''
    };

    sections.splice(idxA, 2, merged);
    renderSections();
    document.getElementById('statusMsg').textContent = `섹션 합치기 완료 → 총 ${sections.length}개 섹션`;
  }

  // ─── 섹션 수동 분리 모드 (문장 단위) ────────────────────────
  function showSectionSplitMode(sectionId) {
    const section = sections.find(s => s.id === sectionId);
    if (!section) return;
    const container = document.getElementById(`split-mode-${sectionId}`);

    // 문장 분리: 마침표 포함 야담 문체 기준
    const sentences = splitSentences(section.text);

    if (sentences.length < 2) {
      container.innerHTML = `<div class="split-mode"><div class="split-mode-hint">⚠ 문장이 1개뿐이라 분리할 수 없습니다.</div></div>`;
      return;
    }

    let html = `<div class="split-mode">
      <div class="split-mode-hint">✂ 나누고 싶은 문장 사이의 구분선을 클릭하세요</div>`;

    sentences.forEach((sent, idx) => {
      html += `<div class="split-sentence">${escHtml(sent)}</div>`;
      if (idx < sentences.length - 1) {
        html += `
        <div class="split-point" onclick="doSectionSplit(${sectionId}, ${idx + 1}, this)">
          <div class="split-point-line"></div>
          <button class="split-point-btn">✂ 여기서 나누기</button>
          <div class="split-point-line"></div>
        </div>`;
      }
    });

    html += `<div class="split-mode-cancel" onclick="hideSectionSplitMode(${sectionId})">✕ 취소</div></div>`;
    container.innerHTML = html;
  }

  function hideSectionSplitMode(sectionId) {
    document.getElementById(`split-mode-${sectionId}`).innerHTML = '';
  }

  function doSectionSplit(sectionId, splitAfterIdx, clickedEl) {
    const sIdx = sections.findIndex(s => s.id === sectionId);
    if (sIdx === -1) return;
    const section = sections[sIdx];

    const sentences = splitSentenceChunks(section.text);

    const textA = sentences.slice(0, splitAfterIdx).join('');
    const textB = sentences.slice(splitAfterIdx).join('');

    const newId = Date.now();
    // 긴 쪽이 원래 제목 유지, 짧은 쪽도 같은 제목 (분리 표시 없음)
    const secA = { ...section, text: textA, scenes: [], sceneLayoutOption: '' };
    const secB = {
      ...section,
      id: newId,
      title: section.title,
      place: section.place,
      time: section.time,
      episode_note: section.episode_note,
      text: textB,
      scenes: [],
      sceneLayoutOption: ''
    };

    sections.splice(sIdx, 1, secA, secB);
    renderSections();
    document.getElementById('statusMsg').textContent = `섹션 분리 완료 → 총 ${sections.length}개 섹션`;
  }

  // ─── 섹션 제목 편집 ──────────────────────────────────────────
  function editSectionTitle(e, sectionId) {
    e.stopPropagation(); // 헤더 토글 방지
    const titleEl = document.getElementById(`section-title-${sectionId}`);
    if (titleEl.tagName === 'INPUT') return; // 이미 편집 중

    const section = sections.find(s => s.id === sectionId);
    if (!section) return;

    const currentText = section.title;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'section-title-edit';
    input.value = currentText;

    titleEl.replaceWith(input);
    input.focus();
    input.select();

    function save() {
      const newTitle = input.value.trim() || currentText;
      section.title = newTitle;
      const div = document.createElement('div');
      div.className = 'section-title';
      div.id = `section-title-${sectionId}`;
      div.textContent = newTitle;
      input.replaceWith(div);
    }

    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') {
        const div = document.createElement('div');
        div.className = 'section-title';
        div.id = `section-title-${sectionId}`;
        div.textContent = currentText;
        input.replaceWith(div);
      }
    });
  }



  async function downloadSceneList() {
    if (!sections.length) return;
    let output = '';

    sections.forEach(s => {
      if (!s.scenes || !s.scenes.length) return;
      s.scenes.forEach(sc => {
        const preview = (sc.text || '').slice(0, 20).replace(/\n/g, ' ').replace(/[,'"'"'"]/g, '');
        output += `${String(sc.num).padStart(3,'0')}_${preview}\n`;
      });
    });

    // 씬 번호 범위 계산
    let minScene = Infinity, maxScene = -Infinity;
    sections.forEach(s => {
      if (!s.scenes || !s.scenes.length) return;
      s.scenes.forEach(sc => {
        if (sc.num < minScene) minScene = sc.num;
        if (sc.num > maxScene) maxScene = sc.num;
      });
    });
    const rangeStr = minScene !== Infinity
      ? `${String(minScene).padStart(3,'0')}-${String(maxScene).padStart(3,'0')}`
      : 'list';
    await saveTextFile(output, `씬목록_${rangeStr}.txt`);
  }

  function buildSectionDownloadText(section, sectionNum) {
    let output = `야담 대본 분리 결과 - 섹션 ${sectionNum}\n`;
    output += '='.repeat(60) + '\n\n';
    output += `【섹션 ${sectionNum}】 ${section.title}\n`;
    output += `  장소: ${section.place}  |  시간: ${section.time}\n`;
    output += `  ${section.episode_note}\n`;
    output += '-'.repeat(60) + '\n\n';

    if (section.scenes && section.scenes.length) {
      section.scenes.forEach(sc => {
        const preview = (sc.text || '').slice(0, 20).replace(/\n/g, ' ').replace(/[,'"'"'"]/g, '');
        output += `  ${String(sc.num).padStart(3,'0')} | ${preview}\n\n`;
        output += sc.text + '\n\n';
        output += '  ' + '·'.repeat(30) + '\n\n';
      });
    } else {
      output += section.text + '\n\n';
    }

    output += '='.repeat(60) + '\n';
    return output;
  }

  function sanitizeFileName(str) {
    return (str || 'section')
      .replace(/[\\/:*?"<>|]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 40) || 'section';
  }

  function setDownloadResult(message) {
    const el = document.getElementById('downloadResultMsg');
    if (el) el.textContent = message || '';
  }

  function triggerBrowserDownload(content, fileName) {
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
    setDownloadResult(`다운로드 시작: ${fileName}`);
  }

  async function saveTextFile(content, fileName) {
    if (!downloadRootHandle || !('showDirectoryPicker' in window)) {
      triggerBrowserDownload(content, fileName);
      return;
    }

    try {
      const folderHandle = await downloadRootHandle.getDirectoryHandle(getDownloadFolderName(), { create: true });
      const fileHandle = await folderHandle.getFileHandle(fileName, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(content);
      await writable.close();
      document.getElementById('statusMsg').textContent = `${getDownloadFolderName()} 폴더에 저장 완료`;
      setDownloadResult(`저장 완료: ${getDownloadFolderName()}/${fileName}`);
    } catch (e) {
      console.error(e);
      triggerBrowserDownload(content, fileName);
      document.getElementById('statusMsg').textContent = '폴더 저장에 실패해 기본 다운로드로 저장했습니다';
      setDownloadResult(`폴더 저장 실패, 기본 다운로드로 전환: ${fileName}`);
    }
  }

  function getSceneRangeText(section) {
    if (!section.scenes || !section.scenes.length) return '';
    const sceneNumbers = section.scenes
      .map(sc => parseInt(sc.num, 10))
      .filter(num => !Number.isNaN(num))
      .sort((a, b) => a - b);

    if (!sceneNumbers.length) return '';

    const startScene = String(sceneNumbers[0]).padStart(3, '0');
    const endScene = String(sceneNumbers[sceneNumbers.length - 1]).padStart(3, '0');
    return startScene === endScene ? `${startScene}` : `${startScene}-${endScene}`;
  }

  function getFirstSceneInfo(section) {
    if (!section.scenes || !section.scenes.length) return null;
    const sortedScenes = [...section.scenes].sort((a, b) => {
      const aNum = parseInt(a.num, 10);
      const bNum = parseInt(b.num, 10);
      return aNum - bNum;
    });
    const firstScene = sortedScenes[0];
    if (!firstScene) return null;

    const sceneNum = String(parseInt(firstScene.num, 10)).padStart(3, '0');
    const preview = (firstScene.text || '').slice(0, 20).replace(/\n/g, ' ').replace(/[,'"'"'"]/g, '').trim();
    return {
      num: sceneNum,
      label: (firstScene.label || '').trim(),
      preview
    };
  }

  function getSceneLayoutGuideText(section) {
    const layoutMap = {
      '1': '한 장면 프롬프트로 만드세요',
      '2by2': '2by2 시네마틱 시퀀스로 만드세요',
      '3by2': '3by2 시네마틱 시퀀스로 만드세요',
      '3by3': '3by3 시네마틱 시퀀스로 만드세요'
    };
    return layoutMap[section.sceneLayoutOption] || '';
  }

  async function downloadSectionSceneList(sectionId) {
    const section = sections.find(s => s.id === sectionId);
    if (!section) return;
    if (!section.scenes || !section.scenes.length) {
      alert('먼저 이 섹션의 씬을 분리해 주세요.');
      return;
    }

    let output = '';
    section.scenes.forEach(sc => {
      const preview = (sc.text || '').slice(0, 20).replace(/\n/g, ' ').replace(/[,'"'"'"]/g, '');
      output += `${String(sc.num).padStart(3,'0')}_${preview}\n`;
    });

    const sceneRange = getSceneRangeText(section) || '씬목록';
    await saveTextFile(output, `${sceneRange}씬목록.txt`);
  }

  async function downloadSection(sectionId) {
    const sectionIndex = sections.findIndex(s => s.id === sectionId);
    if (sectionIndex === -1) return;

    const section = sections[sectionIndex];
    const sectionNum = sectionIndex + 1;
    const output = buildSectionDownloadText(section, sectionNum);
    const safeTitle = sanitizeFileName(section.title);
    let sceneRange = getSceneRangeText(section)
      ? `${getSceneRangeText(section)}씬`
      : `섹션${String(sectionNum).padStart(2,'0')}`;

    const fileName = `${sceneRange}_${safeTitle}.txt`;
    await saveTextFile(output, fileName);
  }

  // ─── DOWNLOAD ─────────────────────────────────────────────────
  async function downloadAll() {
    if (!sections.length) return;
    let minScene = Infinity, maxScene = -Infinity;
    sections.forEach(s => {
      if (!s.scenes || !s.scenes.length) return;
      s.scenes.forEach(sc => {
        if (sc.num < minScene) minScene = sc.num;
        if (sc.num > maxScene) maxScene = sc.num;
      });
    });
    const rangeStr = (minScene !== Infinity)
      ? `${String(minScene).padStart(3,'0')}~${String(maxScene).padStart(3,'0')}`
      : new Date().toISOString().slice(0,10);

    let output = `대본분리 ${rangeStr}\n`;
    output += '='.repeat(60) + '\n\n';

    sections.forEach((s, i) => {
      const num = i + 1;
      const sceneRange = getSceneRangeText(s);
      const layoutGuide = getSceneLayoutGuideText(s);
      const firstScene = getFirstSceneInfo(s);
      output += `【섹션 ${num}】 ${s.title}\n`;
      if (sceneRange) {
        output += `  씬 범위: ${sceneRange}`;
        if (layoutGuide) output += ` | ${layoutGuide}`;
        output += '\n';
      }
      if (firstScene) {
        output += `  시작 씬: ${firstScene.num}`;
        if (firstScene.label) output += ` | ${firstScene.label}`;
        output += '\n';
        if (firstScene.preview) output += `  앞부분: ${firstScene.preview}\n`;
      }
      output += `  장소: ${s.place}  |  시간: ${s.time}\n`;
      output += `  ${s.episode_note}\n`;
      output += '-'.repeat(60) + '\n\n';

      output += s.text + '\n\n';

      output += '='.repeat(60) + '\n\n';
    });

    await saveTextFile(output, `대본분리_${rangeStr}.txt`);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
