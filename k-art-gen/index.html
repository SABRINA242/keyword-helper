<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>시니어 댓글 메이커</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>시니어 댓글 메이커</h1>
        <p class="subtitle">
          유튜브 영상 대본을 붙여 넣으면 바로 사용할 댓글 문구를 자동으로 만들어 줍니다.
        </p>
      </header>

      <main class="app-main">
        <section class="input-section">
          <h2>1. 대본 붙여 넣기</h2>
          <div class="api-key-row">
            <input
              id="openai-api-key"
              class="title-input"
              type="password"
              placeholder="OpenAI API Key (sk-...)"
            />
            <button id="save-api-key-button" class="secondary-button">API 저장</button>
          </div>
          <div class="settings-grid">
            <input
              id="openai-model"
              class="title-input"
              type="text"
              value="gpt-4o-mini"
              placeholder="모델명 (예: gpt-4o-mini)"
            />
            <input
              id="comment-count"
              class="title-input"
              type="number"
              min="10"
              max="10"
              value="10"
              placeholder="댓글 개수(고정 10)"
            />
          </div>
          <textarea
            id="script-input"
            placeholder="유튜브 영상 자막 또는 대본을 그대로 복사해서 붙여 넣으세요."
          ></textarea>
          <div class="input-actions">
            <button id="analyze-button">댓글 자동 생성</button>
            <button id="regenerate-button" class="secondary-button">다시 분석 후 생성</button>
            <button id="reset-button">초기화</button>
            <span class="hint">
              AI가 시니어 시청층에 맞는 존댓말 댓글을 사람처럼 다양하게 생성합니다.
            </span>
          </div>
        </section>

        <section class="output-section">
          <h2>2. 생성된 댓글</h2>
          <div id="results" class="results"></div>
        </section>
      </main>

      <footer class="app-footer">
        <span>브라우저에서만 동작하는 로컬 댓글 생성 도구입니다.</span>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
